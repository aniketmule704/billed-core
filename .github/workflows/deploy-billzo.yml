name: Deploy BillZo

on:
  push:
    branches: [master]
    paths-ignore:
      - 'frappe_docker/**'
      - 'docs/**'
      - 'README.md'
      - 'BILLZO_ARCHITECTURE.md'
      - 'strategy_design.md'
      - 'TODO.md'
  workflow_dispatch:

env:
  PNPM_VERSION: '10'
  NODE_VERSION: '20'

jobs:
  ###############################################################
  # Frontend — typecheck, build, deploy to Vercel
  ###############################################################
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mini_saas_frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: mini_saas_frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Deploy to Vercel
        run: |
          npx vercel deploy \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  ###############################################################
  # Worker — trigger Render deploy via deploy hook
  ###############################################################
  deploy-worker:
    name: Deploy Worker → Render
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
