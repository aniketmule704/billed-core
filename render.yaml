services:
  - type: worker
    name: billzo-worker
    env: node
    region: oregon
    plan: starter
    branch: master
    rootDir: worker
    buildCommand: cd worker && pnpm install && pnpm run build
    startCommand: cd worker && pnpm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GUPSHUP_API_KEY
        sync: false
      - key: GUPSHUP_APP_NAME
        sync: false
      - key: GUPSHUP_SOURCE_NUMBER
        sync: false
