services:
  - type: web
    name: ocr-backend
    repo: https://github.com/abhishek-mule/billed-core
    branch: master
    rootDirectory: ocr_backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: TESSERACT_PATH
        value: /usr/bin/tesseract